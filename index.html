<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutrition Clinical Platform</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Clinical nutrition engine</p>
        <h1>Πλατφόρμα Διατροφικού Πλάνου</h1>
      </div>
      <div class="header-actions">
        <button id="loadCaseBtn" class="secondary-btn" type="button">Load test case</button>
        <button id="printBtn" class="primary-btn" type="button">Print report</button>
      </div>
    </header>

    <main class="app-shell">
      <nav class="tabs" aria-label="Views">
        <button class="tab active" type="button" data-view="dashboard">Dashboard</button>
        <button class="tab" type="button" data-view="inputs">Client</button>
        <button class="tab" type="button" data-view="plans">Plans</button>
        <button class="tab" type="button" data-view="report">Report</button>
      </nav>

      <section id="dashboard" class="view active">
        <div class="kpi-grid">
          <div class="kpi">
            <span>Target kcal</span>
            <strong id="kpiCalories">-</strong>
          </div>
          <div class="kpi">
            <span>Capped plan kcal</span>
            <strong id="kpiCapped">-</strong>
          </div>
          <div class="kpi">
            <span>Calorie gap</span>
            <strong id="kpiGap">-</strong>
          </div>
          <div class="kpi">
            <span>Clinical status</span>
            <strong id="kpiStatus">-</strong>
          </div>
        </div>

        <div class="dashboard-grid">
          <section class="panel">
            <div class="panel-title">
              <h2>Safety flags</h2>
              <span id="flagCount" class="pill">0</span>
            </div>
            <div id="flags" class="flag-list"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>Exchange targets</h2>
              <span class="pill">live</span>
            </div>
            <div id="exchangeTable" class="mini-table"></div>
          </section>

          <section class="panel wide">
            <div class="panel-title">
              <h2>Clinical calorie gap</h2>
              <span id="adjustmentStatus" class="pill"></span>
            </div>
            <p id="gapText" class="clinical-note"></p>
          </section>
        </div>
      </section>

      <section id="inputs" class="view">
        <div class="form-grid">
          <section class="panel">
            <h2>Στοιχεία πελάτη</h2>
            <div class="fields two-col">
              <label>Όνομα<input id="name" value="Verification Case" /></label>
              <label>Φύλο
                <select id="sex">
                  <option value="F">Γυναίκα</option>
                  <option value="M" selected>Άνδρας</option>
                </select>
              </label>
              <label>Ηλικία<input id="age" type="number" value="52" /></label>
              <label>Ύψος cm<input id="height" type="number" value="173" /></label>
              <label>Βάρος kg<input id="weight" type="number" value="159.3" step="0.1" /></label>
              <label>Δραστηριότητα
                <select id="activity">
                  <option>Sedentary</option>
                  <option selected>Light</option>
                  <option>Moderate</option>
                  <option>Active</option>
                  <option>Athlete</option>
                </select>
              </label>
              <label>Στόχος
                <select id="goal">
                  <option selected>Weight Loss</option>
                  <option>Maintenance</option>
                  <option>Weight Gain</option>
                </select>
              </label>
              <label>Κατάσταση
                <select id="condition">
                  <option>General</option>
                  <option selected>Type 2 Diabetes</option>
                  <option>CKD non-dialysis</option>
                  <option>Diabetes + CKD</option>
                  <option>Hypertension</option>
                  <option>Dyslipidemia</option>
                </select>
              </label>
              <label>Manual kcal adjustment<input id="adjustment" type="number" placeholder="blank = suggested" /></label>
              <label>Carb %<input id="carbPct" type="number" value="40" /></label>
              <label>Protein %<input id="proteinPct" type="number" value="25" /></label>
            </div>
          </section>

          <section class="panel">
            <h2>Σωματομετρήσεις</h2>
            <div class="fields two-col">
              <label>Λίπος σώματος %<input id="bodyFat" type="number" value="47.1" step="0.1" /></label>
              <label>Νερό σώματος %<input id="bodyWater" type="number" value="42.3" step="0.1" /></label>
              <label>Λιπώδης μάζα kg<input id="fatMass" type="number" value="75" step="0.1" /></label>
              <label>Μυϊκή μάζα kg<input id="muscleMass" type="number" value="84.3" step="0.1" /></label>
              <label>Μεταβολική ηλικία<input id="metabolicAge" type="number" value="68" /></label>
              <label>Σπλαχνικό λίπος<input id="visceralFat" type="number" value="20" /></label>
            </div>
          </section>

          <section class="panel wide">
            <h2>Κλινικές σημειώσεις</h2>
            <div class="fields two-col">
              <label>Διαγνώσεις<textarea id="diagnoses">Type 2 Diabetes; CKD; Hypertension; Dyslipidemia; Hyperuricemia</textarea></label>
              <label>Φαρμακευτική αγωγή<textarea id="medication">Insulin therapy</textarea></label>
              <label>Αλλεργίες<input id="allergies" value="Ακτινίδιο" /></label>
              <label>Αποφυγές / προτιμήσεις<input id="dislikes" value="Μπιζέλι; φακές; πιπεριά" /></label>
            </div>
          </section>
        </div>
      </section>

      <section id="plans" class="view">
        <div class="plans-layout">
          <section class="panel">
            <div class="panel-title">
              <h2>1-day live plan</h2>
              <span class="pill">Plan A</span>
            </div>
            <div id="oneDayPlan" class="meal-list"></div>
          </section>
          <section class="panel">
            <div class="panel-title">
              <h2>7-day live plan</h2>
              <span class="pill">same engine</span>
            </div>
            <div id="weeklyPlan" class="weekly-list"></div>
          </section>
        </div>
      </section>

      <section id="report" class="view">
        <article id="clinicalReport" class="report"></article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
